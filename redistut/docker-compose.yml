version: '3.8'

services:
  # 1. Spring Boot App (Jab future mein Docker se chalana ho)
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - DB_HOST=mysql
    depends_on:
      - redis
      - mysql

  # 2. Redis Cache Server
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  # 3. MySQL Database
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecomdb