services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy   # <-- MAGIC: App tab tak wait karega jab tak MySQL healthy na ho jaye
      redis:
        condition: service_started

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecomdb
    healthcheck:                     # <-- MAGIC: Ye check karega ki MySQL asal me connection ke liye ready hai ya nahi
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5